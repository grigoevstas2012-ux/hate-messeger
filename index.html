<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hate — redirect</title>
  <style>body{font-family:Inter,Roboto,Arial,Helvetica,sans-serif;background:#0b0b0b;color:#ddd;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}a{color:#7aa2ff}</style>
</head>
<body>
  <div>
    <h3>Определение устройства...</h3>
    <p id="hint">Если перенаправление не сработает — выберите вручную:</p>
    <p><a id="link-pc" href="pc-version/">ПК-версия</a> · <a id="link-mob" href="mobile-version/">Мобильная версия</a></p>
  </div>

  <script>
    // Cookie helpers
    function setCookie(name, value, days){
      const d = new Date(); d.setTime(d.getTime() + (days*24*60*60*1000));
      document.cookie = name + '=' + encodeURIComponent(value) + ';path=/;max-age=' + (days*24*60*60) + ';SameSite=Lax';
    }
    function getCookie(name){
      const m = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
      return m ? decodeURIComponent(m.pop()) : null;
    }

    function isMobileUA(){
      const ua = navigator.userAgent || '';
      const mobileRe = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i;
      const touch = ('ontouchstart' in window) || (navigator.maxTouchPoints && navigator.maxTouchPoints>0);
      const smallScreen = window.matchMedia && window.matchMedia('(max-width:768px)').matches;
      return mobileRe.test(ua) || (touch && smallScreen);
    }

    (function(){
      try{
        // URL param override
        const params = new URLSearchParams(window.location.search);
        const viewParam = params.get('view');
        if(viewParam === 'pc' || viewParam === 'mobile'){
          setCookie('prefer_view', viewParam, 30);
          return window.location.replace(viewParam === 'mobile' ? 'mobile-version/' : 'pc-version/');
        }

        // Cookie override
        const pref = getCookie('prefer_view');
        if(pref === 'pc' || pref === 'mobile'){
          return window.location.replace(pref === 'mobile' ? 'mobile-version/' : 'pc-version/');
        }

        // Fallback to UA detection
        const to = isMobileUA() ? 'mobile-version/' : 'pc-version/';
        window.location.replace(to);
      }catch(e){
        document.getElementById('hint').textContent = 'Ошибка автоматического перенаправления. Используйте ссылки ниже.';
      }
    })();
  </script>
</body>
</html>
